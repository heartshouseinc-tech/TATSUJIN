<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>ZERO MIND — 脳書き換え達人訓練</title>
<style>
:root{
  --bg:#0a0a0f;
  --bg2:#10101a;
  --bg3:#16162a;
  --card:#1a1a2e;
  --card2:#1e1e38;
  --bor:#2a2a4a;
  --bor2:#3a3a6a;
  --gold:#c9a84c;
  --gold2:#e8c97a;
  --red:#e63946;
  --teal:#2ec4b6;
  --purple:#7c3aed;
  --purple2:#a855f7;
  --txt:#e8e8f0;
  --txt2:#9898b8;
  --txt3:#5858a8;
  --sh:0 8px 32px rgba(0,0,0,.6);
  --sh2:0 2px 12px rgba(0,0,0,.4);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--txt);font-family:'Hiragino Sans','Noto Sans JP',sans-serif;min-height:100vh;overflow-x:hidden;}

/* ── スプラッシュ ── */
#splash{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .8s;}
#splash.hide{opacity:0;pointer-events:none;}
.splash-kanji{font-size:80px;font-weight:900;background:linear-gradient(135deg,var(--gold),var(--gold2),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:pulse 2s ease-in-out infinite;}
.splash-title{font-size:14px;letter-spacing:8px;color:var(--gold2);margin-top:8px;opacity:.8;}
.splash-sub{font-size:11px;color:var(--txt3);margin-top:24px;letter-spacing:2px;}
@keyframes pulse{0%,100%{opacity:.7;}50%{opacity:1;}}

/* ── 共通 ── */
.screen{display:none;min-height:100vh;padding-bottom:80px;}
.screen.active{display:block;}
.glow-line{height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:0;}

/* ── ナビ ── */
#nav{position:fixed;bottom:0;left:0;right:0;background:rgba(10,10,15,.95);backdrop-filter:blur(20px);border-top:1px solid var(--bor);display:flex;z-index:100;}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 0;border:none;background:none;color:var(--txt3);font-size:9px;font-family:inherit;cursor:pointer;transition:.2s;letter-spacing:.5px;}
.nav-btn.active{color:var(--gold);}
.nav-btn span{font-size:20px;}

/* ── ホーム ── */
.home-hero{padding:40px 20px 24px;text-align:center;position:relative;overflow:hidden;}
.home-hero::before{content:'無';position:absolute;font-size:200px;font-weight:900;color:rgba(201,168,76,.04);top:-20px;left:50%;transform:translateX(-50%);pointer-events:none;}
.hero-eyebrow{font-size:10px;letter-spacing:4px;color:var(--gold);margin-bottom:12px;}
.hero-title{font-size:28px;font-weight:900;line-height:1.2;margin-bottom:8px;}
.hero-title em{font-style:normal;background:linear-gradient(135deg,var(--gold),var(--gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.hero-sub{font-size:12px;color:var(--txt2);line-height:1.8;}

/* ── モード選択 ── */
.mode-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;padding:0 16px 20px;}
.mode-card{background:var(--card);border:1px solid var(--bor);border-radius:16px;padding:16px 10px;text-align:center;cursor:pointer;transition:.2s;position:relative;overflow:hidden;}
.mode-card::before{content:'';position:absolute;inset:0;opacity:0;transition:.3s;}
.mode-card:active{transform:scale(.96);}
.mode-card.budo::before{background:linear-gradient(135deg,rgba(230,57,70,.1),transparent);}
.mode-card.renai::before{background:linear-gradient(135deg,rgba(124,58,237,.1),transparent);}
.mode-card.jinsei::before{background:linear-gradient(135deg,rgba(46,196,182,.1),transparent);}
.mode-card:active::before{opacity:1;}
.mode-icon{font-size:28px;margin-bottom:6px;}
.mode-name{font-size:11px;font-weight:700;letter-spacing:1px;}
.mode-name.budo{color:var(--red);}
.mode-name.renai{color:var(--purple2);}
.mode-name.jinsei{color:var(--teal);}
.mode-tag{font-size:9px;color:var(--txt3);margin-top:3px;}

/* ── 今日のミッション ── */
.section{padding:0 16px 16px;}
.sec-label{font-size:9px;letter-spacing:3px;color:var(--gold);margin-bottom:12px;}
.mission-card{background:var(--card);border:1px solid var(--bor);border-radius:16px;padding:18px;}
.mission-phase{font-size:9px;letter-spacing:2px;color:var(--txt3);margin-bottom:6px;}
.mission-text{font-size:14px;font-weight:700;line-height:1.7;margin-bottom:14px;}
.mission-done-btn{width:100%;padding:12px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--gold),#a8832a);color:#0a0a0f;font-size:13px;font-weight:900;cursor:pointer;letter-spacing:1px;}

/* ── 成長レーダー ── */
.radar-wrap{background:var(--card);border:1px solid var(--bor);border-radius:16px;padding:18px;}
.radar-title{font-size:12px;font-weight:700;color:var(--txt2);margin-bottom:14px;text-align:center;}
.radar-bars{display:flex;flex-direction:column;gap:10px;}
.rbar{display:flex;align-items:center;gap:10px;}
.rbar-label{font-size:10px;color:var(--txt2);width:60px;flex-shrink:0;}
.rbar-track{flex:1;height:4px;background:var(--bor);border-radius:2px;overflow:hidden;}
.rbar-fill{height:100%;border-radius:2px;transition:width 1s ease;}
.rbar-fill.budo{background:linear-gradient(90deg,var(--red),#ff6b6b);}
.rbar-fill.renai{background:linear-gradient(90deg,var(--purple),var(--purple2));}
.rbar-fill.jinsei{background:linear-gradient(90deg,var(--teal),#7efff5);}
.rbar-pct{font-size:10px;color:var(--gold);width:28px;text-align:right;flex-shrink:0;}

/* ── 道場（AIチャット） ── */
.dojo-header{padding:20px 16px 0;display:flex;gap:10px;align-items:flex-start;}
.chara-select{display:flex;gap:8px;padding:0 16px 14px;overflow-x:auto;scrollbar-width:none;}
.chara-select::-webkit-scrollbar{display:none;}
.chara-btn{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 14px;border-radius:12px;border:1px solid var(--bor);background:var(--card);cursor:pointer;transition:.2s;}
.chara-btn.active{border-color:var(--gold);background:rgba(201,168,76,.1);}
.chara-avatar{font-size:24px;}
.chara-name{font-size:10px;font-weight:700;color:var(--txt2);}
.chara-btn.active .chara-name{color:var(--gold);}

.chat-area{padding:0 16px;min-height:200px;margin-bottom:10px;}
.chat-msg{margin-bottom:14px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
.chat-msg.user{text-align:right;}
.chat-bubble{display:inline-block;padding:11px 14px;border-radius:16px;font-size:13px;line-height:1.7;max-width:85%;text-align:left;}
.chat-msg.ai .chat-bubble{background:var(--card2);border:1px solid var(--bor);color:var(--txt);}
.chat-msg.user .chat-bubble{background:linear-gradient(135deg,#3a2a6a,#4a1a7a);color:#e8d8ff;border:1px solid rgba(124,58,237,.3);}
.chat-msg .chara-label{font-size:9px;color:var(--gold);letter-spacing:1px;margin-bottom:5px;}

.chat-input-area{padding:10px 16px 0;display:flex;gap:8px;}
.chat-ta{flex:1;background:var(--card2);border:1px solid var(--bor);border-radius:12px;padding:11px 14px;color:var(--txt);font-size:13px;font-family:inherit;resize:none;outline:none;height:44px;max-height:100px;transition:height .1s;}
.chat-ta:focus{border-color:var(--bor2);}
.chat-send{width:44px;height:44px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--gold),#a8832a);color:#0a0a0f;font-size:18px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;}

/* ── 訓練（モード詳細） ── */
.phase-tabs{display:flex;gap:0;border-bottom:1px solid var(--bor);margin:0 16px 16px;overflow-x:auto;scrollbar-width:none;}
.phase-tabs::-webkit-scrollbar{display:none;}
.phase-tab{flex-shrink:0;padding:10px 16px;border:none;background:none;color:var(--txt3);font-size:11px;font-weight:700;cursor:pointer;border-bottom:2px solid transparent;font-family:inherit;letter-spacing:.5px;}
.phase-tab.active{color:var(--gold);border-bottom-color:var(--gold);}

.training-card{background:var(--card);border:1px solid var(--bor);border-radius:16px;padding:18px;margin-bottom:12px;}
.training-num{font-size:9px;letter-spacing:2px;color:var(--txt3);margin-bottom:6px;}
.training-title{font-size:15px;font-weight:800;margin-bottom:10px;color:var(--txt);}
.training-method{font-size:12px;color:var(--txt2);line-height:1.8;margin-bottom:12px;padding:10px;background:var(--bg3);border-radius:8px;border-left:2px solid var(--gold);}
.training-effect{font-size:11px;color:var(--teal);line-height:1.7;}
.training-effect::before{content:'▶ 脳への効果：';font-weight:700;opacity:.7;}
.timer-btn{margin-top:12px;padding:10px 20px;border-radius:8px;border:1px solid var(--gold);background:transparent;color:var(--gold);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;}
.timer-btn.running{background:rgba(201,168,76,.1);}

/* ── ジャーナル ── */
.journal-entry{background:var(--card);border:1px solid var(--bor);border-radius:14px;padding:16px;margin-bottom:10px;}
.journal-date{font-size:10px;color:var(--txt3);margin-bottom:6px;}
.journal-mode-badge{display:inline-block;font-size:9px;font-weight:700;padding:2px 8px;border-radius:10px;margin-bottom:8px;}
.badge-budo{background:rgba(230,57,70,.15);color:var(--red);}
.badge-renai{background:rgba(124,58,237,.15);color:var(--purple2);}
.badge-jinsei{background:rgba(46,196,182,.15);color:var(--teal);}
.journal-text{font-size:12px;color:var(--txt2);line-height:1.8;}
.journal-ai-insight{font-size:11px;color:var(--gold);margin-top:10px;padding:8px;background:rgba(201,168,76,.05);border-radius:8px;border-left:2px solid var(--gold);line-height:1.7;}

/* ── フォーム ── */
.jform{padding:16px;background:var(--card);border-top:1px solid var(--bor);position:sticky;bottom:80px;}
.jform-ta{width:100%;background:var(--bg3);border:1px solid var(--bor);border-radius:10px;padding:11px 14px;color:var(--txt);font-size:13px;font-family:inherit;resize:none;outline:none;}
.jform-btns{display:flex;gap:8px;margin-top:8px;}
.jform-mode-sel{flex:1;padding:9px;border-radius:8px;border:1px solid var(--bor);background:var(--bg3);color:var(--txt2);font-size:11px;font-family:inherit;}
.jform-save{padding:9px 18px;border-radius:8px;border:none;background:linear-gradient(135deg,var(--gold),#a8832a);color:#0a0a0f;font-size:12px;font-weight:800;cursor:pointer;}

/* ── Toast ── */
#toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:rgba(201,168,76,.95);color:#0a0a0f;padding:10px 20px;border-radius:20px;font-size:12px;font-weight:700;z-index:9999;pointer-events:none;opacity:0;transition:opacity .3s;white-space:nowrap;}
#toast.show{opacity:1;}

/* ── タイマーオーバーレイ ── */
#timer-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:9000;flex-direction:column;align-items:center;justify-content:center;gap:20px;}
#timer-overlay.show{display:flex;}
.timer-display{font-size:72px;font-weight:900;color:var(--gold);font-variant-numeric:tabular-nums;}
.timer-label{font-size:14px;color:var(--txt2);letter-spacing:2px;}
.timer-close{padding:12px 28px;border-radius:12px;border:1px solid var(--bor);background:transparent;color:var(--txt2);font-size:14px;cursor:pointer;font-family:inherit;}

/* ── Firebase module ── */
</style>
</head>
<body>

<!-- スプラッシュ -->
<div id="splash">
  <div class="splash-kanji">無</div>
  <div class="splash-title">ZERO MIND</div>
  <div class="splash-sub">脳書き換え達人訓練</div>
</div>

<!-- ホーム -->
<div id="screen-home" class="screen active">
  <div class="home-hero">
    <div class="hero-eyebrow">MASTERY ROADMAP</div>
    <div class="hero-title">脳のOSを<br><em>達人モード</em>へ</div>
    <div class="hero-sub" style="margin-top:10px;">武道・恋愛・人生<br>すべての場面で主導権を握る</div>
  </div>
  <div class="glow-line"></div>

  <!-- モード選択 -->
  <div style="padding:20px 16px 10px;"><div class="sec-label">モードを選ぶ</div></div>
  <div class="mode-grid">
    <div class="mode-card budo" onclick="goTraining('budo')">
      <div class="mode-icon">🥷</div>
      <div class="mode-name budo">武道</div>
      <div class="mode-tag">身体の崩し</div>
    </div>
    <div class="mode-card renai" onclick="goTraining('renai')">
      <div class="mode-icon">🌒</div>
      <div class="mode-name renai">恋愛</div>
      <div class="mode-tag">心の引力</div>
    </div>
    <div class="mode-card jinsei" onclick="goTraining('jinsei')">
      <div class="mode-icon">🌌</div>
      <div class="mode-name jinsei">人生</div>
      <div class="mode-tag">現実の磁場</div>
    </div>
  </div>

  <!-- 今日のミッション -->
  <div class="section">
    <div class="sec-label">今日のミッション</div>
    <div class="mission-card" id="mission-card">
      <div class="mission-phase" id="mission-phase">第1階層 — 覚醒</div>
      <div class="mission-text" id="mission-text">読み込み中...</div>
      <button class="mission-done-btn" onclick="completeMission()">✓ 完了した</button>
    </div>
  </div>

  <!-- 成長レーダー -->
  <div class="section">
    <div class="sec-label">脳OS更新状況</div>
    <div class="radar-wrap">
      <div class="radar-title">12の習得ポイント</div>
      <div class="radar-bars" id="radar-bars"></div>
    </div>
  </div>
</div>

<!-- 道場（AIチャット） -->
<div id="screen-dojo" class="screen">
  <div style="padding:24px 16px 0;">
    <div class="sec-label">DOJO — 達人に問う</div>
    <div style="font-size:12px;color:var(--txt2);margin-bottom:16px;">達人キャラクターを選んで問いかけよう</div>
  </div>
  <div class="chara-select">
    <div class="chara-btn active" onclick="selectChara('muto')" id="btn-muto">
      <div class="chara-avatar">⚔️</div>
      <div class="chara-name">無刀斎</div>
    </div>
    <div class="chara-btn" onclick="selectChara('midori')" id="btn-midori">
      <div class="chara-avatar">🌙</div>
      <div class="chara-name">碧</div>
    </div>
    <div class="chara-btn" onclick="selectChara('kuro')" id="btn-kuro">
      <div class="chara-avatar">🌑</div>
      <div class="chara-name">玄</div>
    </div>
  </div>
  <div class="chat-area" id="chat-area"></div>
  <div class="chat-input-area">
    <textarea class="chat-ta" id="chat-ta" placeholder="達人に問いかける..." rows="1"
      oninput="autoResize(this)" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChat();}"></textarea>
    <button class="chat-send" onclick="sendChat()">↑</button>
  </div>
</div>

<!-- 訓練 -->
<div id="screen-training" class="screen">
  <div style="padding:24px 16px 14px;">
    <div class="sec-label" id="training-eyebrow">武道モード</div>
  </div>
  <div class="phase-tabs" id="phase-tabs">
    <button class="phase-tab active" data-phase="0" onclick="switchPhase(0)">第1階層 覚醒</button>
    <button class="phase-tab" data-phase="1" onclick="switchPhase(1)">第2階層 変革</button>
    <button class="phase-tab" data-phase="2" onclick="switchPhase(2)">第3階層 統御</button>
    <button class="phase-tab" data-phase="3" onclick="switchPhase(3)">第4階層 神妙</button>
  </div>
  <div style="padding:0 16px 20px;" id="training-content"></div>
</div>

<!-- ジャーナル -->
<div id="screen-journal" class="screen">
  <div style="padding:24px 16px 0;">
    <div class="sec-label">JOURNAL — 気づきを刻む</div>
    <div style="font-size:11px;color:var(--txt2);margin-bottom:14px;">今日の訓練で気づいたことを記録する。AIが達人フレームで解釈する。</div>
  </div>
  <div id="journal-list" style="padding:0 16px;"></div>
  <div class="jform">
    <textarea class="jform-ta" id="jform-ta" rows="3" placeholder="今日の訓練・気づき・体験を書く..."></textarea>
    <div class="jform-btns">
      <select class="jform-mode-sel" id="jform-mode">
        <option value="budo">🥷 武道</option>
        <option value="renai">🌒 恋愛</option>
        <option value="jinsei">🌌 人生</option>
      </select>
      <button class="jform-save" onclick="saveJournal()">記録 →</button>
    </div>
  </div>
</div>

<!-- ナビ -->
<nav id="nav">
  <button class="nav-btn active" onclick="goScreen('home')" id="nav-home"><span>⚡</span>ホーム</button>
  <button class="nav-btn" onclick="goScreen('dojo')" id="nav-dojo"><span>🗡️</span>道場</button>
  <button class="nav-btn" onclick="goScreen('training')" id="nav-training"><span>🥷</span>訓練</button>
  <button class="nav-btn" onclick="goScreen('journal')" id="nav-journal"><span>📿</span>記録</button>
</nav>

<div id="toast"></div>

<!-- タイマー -->
<div id="timer-overlay">
  <div class="timer-label" id="timer-label">訓練中</div>
  <div class="timer-display" id="timer-display">3:00</div>
  <button class="timer-close" onclick="stopTimer()">終了</button>
</div>

function saveState(){ try{localStorage.setItem('zm_state',JSON.stringify(state));}catch(e){} }

    if(s){const d=JSON.parse(s);Object.assign(state,d);}
  }catch(e){}
}

// ═══ 初期化 ═══
window.addEventListener('load',()=>{
  loadState();
  setTimeout(()=>{
    document.getElementById('splash').classList.add('hide');
  },1800);
  renderRadar();
  renderMission();
  renderJournal();

// ═══ ナビ ═══
function goScreen(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('nav-'+name).classList.add('active');
  if(name==='dojo') scrollChatBottom();
}
window.goScreen=goScreen;

function goTraining(mode){
  state.currentMode=mode;
  state.currentPhase=0;
  saveState();
  renderTraining();
  goScreen('training');
}
window.goTraining=goTraining;

// ═══ ミッション ═══
function renderMission(){
  const today=new Date().toDateString();
  if(!state.todayMission||state.todayMission.date!==today){
    const idx=Math.floor(Math.random()*MISSIONS.length);
    state.todayMission={...MISSIONS[idx],date:today,done:false};
    saveState();
  }
  const m=state.todayMission;
  document.getElementById('mission-phase').textContent=m.phase;
  document.getElementById('mission-text').textContent=m.text;
  if(m.done){
    document.querySelector('.mission-done-btn').textContent='✓ 完了済み';
    document.querySelector('.mission-done-btn').disabled=true;
    document.querySelector('.mission-done-btn').style.opacity='.5';
  }
}

function completeMission(){
  state.todayMission.done=true;
  const m=state.todayMission;
  const mi=MISSIONS.findIndex(x=>x.text===m.text);
  const phaseIdx=m.phase.includes('1')?0:m.phase.includes('2')?1:m.phase.includes('3')?2:3;
  if(state.growth[m.mode||'budo']){
    state.growth[m.mode||'budo'][phaseIdx]=Math.min(100,state.growth[m.mode||'budo'][phaseIdx]+15);
  }
  saveState();
  renderRadar();
  renderMission();
  showToast('✓ 脳OSを更新しました');
}
window.completeMission=completeMission;

// ═══ レーダー ═══
function renderRadar(){
  const phases=['覚醒','変革','統御','神妙'];
  const modes=[
    {key:'budo',label:'武道',cls:'budo'},
    {key:'renai',label:'恋愛',cls:'renai'},
    {key:'jinsei',label:'人生',cls:'jinsei'}
  ];
  const bars=document.getElementById('radar-bars');
  bars.innerHTML=phases.map((p,i)=>
    modes.map(m=>`
      <div class="rbar">
        <div class="rbar-label" style="font-size:9px;">${m.label} ${p}</div>
        <div class="rbar-track"><div class="rbar-fill ${m.cls}" style="width:${state.growth[m.key][i]}%"></div></div>
        <div class="rbar-pct">${state.growth[m.key][i]}</div>
      </div>`).join('')
  ).join('');
}

// ═══ 訓練 ═══
function renderTraining(){
  const td=TRAININGS[state.currentMode];
  document.getElementById('training-eyebrow').textContent=td.label;
  const tabs=document.getElementById('phase-tabs');
  tabs.innerHTML=td.phases.map((p,i)=>
    `<button class="phase-tab${i===state.currentPhase?' active':''}" data-phase="${i}" onclick="switchPhase(${i})">${p.name}</button>`
  ).join('');
  renderPhaseContent();
}

function switchPhase(idx){
  state.currentPhase=idx;
  document.querySelectorAll('.phase-tab').forEach((b,i)=>b.classList.toggle('active',i===idx));
  renderPhaseContent();
}
window.switchPhase=switchPhase;

function renderPhaseContent(){
  const td=TRAININGS[state.currentMode];
  const phase=td.phases[state.currentPhase];
  document.getElementById('training-content').innerHTML=phase.items.map((item,i)=>`
    <div class="training-card">
      <div class="training-num">訓練 ${i+1}</div>
      <div class="training-title">${item.title}</div>
      <div class="training-method">${item.method}</div>
      <div class="training-effect">${item.effect}</div>
      ${item.breath
        ? `<button class="timer-btn" onclick="startBreathTimer(${JSON.stringify(item.breath)})">🫁 ${item.breath.label}を開始（${item.breath.sets}セット）</button>`
        : item.timer>0
          ? `<button class="timer-btn" onclick="startTimer(${item.timer},'${item.title}')">⏱ ${Math.floor(item.timer/60)?Math.floor(item.timer/60)+'分':''}${item.timer%60?item.timer%60+'秒':''}タイマー</button>`
          : ''
      }
    </div>`).join('');
}

// ═══ タイマー ═══
let timerInterval=null;

// 呼吸タイマー（ボックス呼吸・エレイズ呼吸）
function startBreathTimer(breath){
  document.getElementById('timer-label').textContent=breath.label;
  document.getElementById('timer-overlay').classList.add('show');
  let set=1, phase=0;
  const phases=breath.hold2>0
    ?[{label:'吸う',sec:breath.inhale},{label:'止める',sec:breath.hold1},{label:'吐く',sec:breath.exhale},{label:'止める',sec:breath.hold2}]
    :[{label:'吸う',sec:breath.inhale},{label:'止める',sec:breath.hold1},{label:'吐く',sec:breath.exhale}];
  const nonZero=phases.filter(p=>p.sec>0);
  let phIdx=0, remain=nonZero[0].sec;

  function tick(){
    document.getElementById('timer-display').textContent=remain;
    document.getElementById('timer-label').textContent=
      `${breath.label}  ${set}/${breath.sets}セット目　「${nonZero[phIdx].label}」`;
    remain--;
    if(remain<0){
      phIdx++;
      if(phIdx>=nonZero.length){
        phIdx=0; set++;
        if(set>breath.sets){
          clearInterval(timerInterval);
          document.getElementById('timer-overlay').classList.remove('show');
          showToast('✓ '+breath.label+'完了');
          return;
        }
      }
      remain=nonZero[phIdx].sec;
    }
  }
  tick();
  timerInterval=setInterval(tick,1000);
}

function startTimer(sec,label){
  document.getElementById('timer-label').textContent=label;
  let remain=sec;
  updateTimerDisplay(remain);
  document.getElementById('timer-overlay').classList.add('show');
  timerInterval=setInterval(()=>{
    remain--;
    updateTimerDisplay(remain);
    if(remain<=0){
      clearInterval(timerInterval);
      document.getElementById('timer-overlay').classList.remove('show');
      showToast('✓ 訓練完了');
    }
  },1000);
}
function stopTimer(){
  clearInterval(timerInterval);
  document.getElementById('timer-overlay').classList.remove('show');
}
function updateTimerDisplay(sec){
  const m=Math.floor(sec/60),s=sec%60;
  document.getElementById('timer-display').textContent=`${m}:${String(s).padStart(2,'0')}`;
}
window.startTimer=startTimer;
window.startBreathTimer=startBreathTimer;
window.stopTimer=stopTimer;

// ═══ AIチャット ═══
function initChat(){
  const c=CHARAS[state.currentChara];
  const area=document.getElementById('chat-area');
  if(area.innerHTML===''){
    addChatMsg('ai',`${c.icon} 問いかけよ。導こう。`);
  }
}

function selectChara(id){
  state.currentChara=id;
  document.querySelectorAll('.chara-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('btn-'+id).classList.add('active');
  state.chatHistory=[];
  const area=document.getElementById('chat-area');
  area.innerHTML='';
  const c=CHARAS[id];
  addChatMsg('ai',`${c.icon} 私は${c.name}。${c.style}の道を歩む者。何を問う？`);
  saveState();
}
window.selectChara=selectChara;

function addChatMsg(role,text){
  const area=document.getElementById('chat-area');
  const c=CHARAS[state.currentChara];
  const div=document.createElement('div');
  div.className='chat-msg '+role;
  div.innerHTML=role==='ai'
    ?`<div class="chara-label">${c.icon} ${c.name}</div><div class="chat-bubble">${text.replace(/\n/g,'<br>')}</div>`
    :`<div class="chat-bubble">${text.replace(/\n/g,'<br>')}</div>`;
  area.appendChild(div);
  scrollChatBottom();
}

function scrollChatBottom(){
  const a=document.getElementById('chat-area');
  if(a) a.scrollTop=a.scrollHeight;
}

async function sendChat(){
  const ta=document.getElementById('chat-ta');
  const text=ta.value.trim();
  if(!text) return;
  ta.value='';
  ta.style.height='44px';
  addChatMsg('user',text);
  state.chatHistory.push({role:'user',content:text});

  const c=CHARAS[state.currentChara];
  const thinking=document.createElement('div');
  thinking.className='chat-msg ai';
  thinking.id='thinking';
  thinking.innerHTML=`<div class="chara-label">${c.icon} ${c.name}</div><div class="chat-bubble" style="color:var(--txt3)">...</div>`;
  document.getElementById('chat-area').appendChild(thinking);
  scrollChatBottom();

  try{
    const prompt=state.chatHistory.map(m=>m.role+': '+m.content).join('\n')+'\n\n'+text;
    const r=await fetch(FUNC_BASE+'/askAI',{
      method:'POST',
      headers:{'Content-Type':'application/json','X-Access-Key':HH_KEY},
      body:JSON.stringify({model:'gemini-2.5-flash',prompt:c.system+'\n\n'+prompt,useSearch:false})
    });
    const json=await r.json().catch(()=>({}));
    const reply=json?.data?.text||json?.candidates?.[0]?.content?.parts?.[0]?.text||json?.text||'...';
    thinking.remove();
    addChatMsg('ai',reply);
    state.chatHistory.push({role:'assistant',content:reply});
    if(state.chatHistory.length>20) state.chatHistory=state.chatHistory.slice(-20);
    saveState();
  }catch(e){
    thinking.remove();
    addChatMsg('ai','…通信の乱れ。もう一度問いかけよ。');
  }
}
window.sendChat=sendChat;

function autoResize(el){
  el.style.height='44px';
  el.style.height=Math.min(el.scrollHeight,100)+'px';
}
window.autoResize=autoResize;

// ═══ ジャーナル ═══
function renderJournal(){
  const list=document.getElementById('journal-list');
  if(!state.journals.length){
    list.innerHTML='<div style="text-align:center;color:var(--txt3);font-size:12px;padding:30px;">まだ記録がありません。<br>今日の気づきを刻もう。</div>';
    return;
  }
  list.innerHTML=state.journals.slice().reverse().map(j=>`
    <div class="journal-entry">
      <div class="journal-date">${j.date}</div>
      <div class="journal-mode-badge badge-${j.mode}">${j.modeLabel}</div>
      <div class="journal-text">${j.text}</div>
      ${j.insight?`<div class="journal-ai-insight">${j.insight}</div>`:''}
    </div>`).join('');
}

async function saveJournal(){
  const ta=document.getElementById('jform-ta');
  const text=ta.value.trim();
  if(!text){showToast('気づきを入力してください');return;}
  const mode=document.getElementById('jform-mode').value;
  const modeLabels={budo:'🥷 武道',renai:'🌒 恋愛',jinsei:'🌌 人生'};
  const now=new Date();
  const dateStr=now.getFullYear()+'/'+(now.getMonth()+1)+'/'+now.getDate()+' '+now.getHours()+':'+String(now.getMinutes()).padStart(2,'0');

  const entry={date:dateStr,mode,modeLabel:modeLabels[mode],text,insight:''};
  state.journals.push(entry);
  saveState();
  ta.value='';
  renderJournal();
  showToast('記録しました。AIが解釈中...');

  // AIに達人フレームで解釈させる
  const chara=mode==='budo'?CHARAS.muto:mode==='renai'?CHARAS.midori:CHARAS.kuro;
  try{
    const prompt=chara.system+'\n\n以下の訓練の気づきを達人の視点から30字以内で一言解釈してください。\n\n「'+text+'」';
    const r=await fetch(FUNC_BASE+'/askAI',{
      method:'POST',
      headers:{'Content-Type':'application/json','X-Access-Key':HH_KEY},
      body:JSON.stringify({model:'gemini-2.5-flash',prompt,useSearch:false})
    });
    const json=await r.json().catch(()=>({}));
    const insight=json?.data?.text||json?.candidates?.[0]?.content?.parts?.[0]?.text||json?.text||'';
    entry.insight=insight;
    state.journals[state.journals.length-1].insight=insight;
    saveState();
    renderJournal();
  }catch(e){}

  // Firestoreにも保存
  const fb=window.__zm;
  if(fb&&window._uid){
    try{
      await fb.addDoc(fb.collection(fb.db,'users',window._uid,'zm_journals'),{
        ...entry,createdAt:fb.serverTimestamp()
      });
    }catch(e){}
  }
}
window.saveJournal=saveJournal;

// ═══ Toast ═══
let toastTimer;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),3000);
}
window.showToast=showToast;
</script>
